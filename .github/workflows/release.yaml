name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2026.1.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
            binary: kiro-rs
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
            binary: kiro-rs
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
            binary: kiro-rs.exe
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
            binary: kiro-rs
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64
            binary: kiro-rs

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: pnpm install --frozen-lockfile

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Create archive (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          ARCHIVE_NAME="kiro-rs-${VERSION}-${{ matrix.name }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE_NAME}" ${{ matrix.binary }}
          cd ../../..
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version || github.ref_name }}"
          $ARCHIVE_NAME = "kiro-rs-${VERSION}-${{ matrix.name }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath $ARCHIVE_NAME
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $env:GITHUB_ENV
          echo "ARCHIVE_PATH=$ARCHIVE_NAME" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          cat > release_notes.md << 'EOF'
          ## kiro-rs ${{ github.event.inputs.version || github.ref_name }}

          ### 下载说明

          根据你的操作系统下载对应的文件：

          - **Windows**: `kiro-rs-*-Windows-x64.zip`
          - **macOS (Apple Silicon)**: `kiro-rs-*-macOS-arm64.tar.gz`
          - **macOS (Intel)**: `kiro-rs-*-macOS-x64.tar.gz`
          - **Linux (x64)**: `kiro-rs-*-Linux-x64.tar.gz`
          - **Linux (ARM64)**: `kiro-rs-*-Linux-arm64.tar.gz`

          ### 安装方法

          #### Windows
          1. 解压 zip 文件
          2. 将 `kiro-rs.exe` 放到你想要的目录
          3. 创建 `config.json` 和 `credentials.json` 配置文件
          4. 运行 `kiro-rs.exe`

          #### macOS / Linux
          ```bash
          # 解压文件
          tar xzf kiro-rs-*.tar.gz

          # 添加执行权限
          chmod +x kiro-rs

          # 创建配置文件
          # 参考 README.md 中的配置说明

          # 运行
          ./kiro-rs
          ```

          ### 配置文件

          请参考项目 README.md 创建 `config.json` 和 `credentials.json` 配置文件。

          最小配置示例：

          **config.json**
          ```json
          {
            "host": "127.0.0.1",
            "port": 8990,
            "apiKey": "sk-kiro-rs-your-secret-key",
            "region": "us-east-1"
          }
          ```

          **credentials.json**
          ```json
          {
            "refreshToken": "your-refresh-token",
            "expiresAt": "2025-12-31T02:32:45.144Z",
            "authMethod": "social"
          }
          ```

          ### 完整文档

          详细配置说明请查看 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)

          ---

          **完整变更日志**: https://github.com/${{ github.repository }}/commits/${{ github.event.inputs.version || github.ref_name }}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}